<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portafolio de Evidencias - Llantera</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="header-card">
        <h1>LLANTERA</h1>
        <p>Portafolio de Evidencias - Ingeniería de Software</p>
      </div>

      <div class="cards-wrapper">
        <div
          class="section-card"
          onclick="verPDF('descripcionProblematica.pdf')"
        >
          <i class="fas fa-file-contract"></i>
          <h6>Descripción y Reglas de Negocio</h6>
        </div>

        <div class="section-card" onclick="verPDF('1mockups.pdf')">
          <i class="fas fa-layer-group"></i>
          <h6>Mockups</h6>
        </div>

        <div class="section-card" onclick="verPDF('/docs/casosUso.pdf')">
          <i class="fas fa-diagram-project"></i>
          <h6>Casos de Uso</h6>
        </div>

        <div
          class="section-card"
          onclick="verPDF('/docs/historiasUsuario.pdf')"
        >
          <i class="fas fa-users-viewfinder"></i>
          <h6>Historias de Usuario</h6>
        </div>

        <div class="section-card" onclick="verPDF('/docs/cronograma.pdf')">
          <i class="fas fa-calendar-check"></i>
          <h6>Cronograma y Lista de Tareas</h6>
        </div>
      </div>
    </div>

    <div class="modal fade" id="pdfModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Vista Previa del Documento</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-0">
            <iframe
              id="pdfViewer"
              src=""
              class="pdf-container"
              style="width: 100%; height: 80vh; border: none"
            ></iframe>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
